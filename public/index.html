<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gacha Alien Stage</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="dark-mode"> <div id="auth-screen" class="full-screen">
        <div class="auth-box">
            <h1>Gacha Alien Stage</h1>
            <input type="text" id="login-id" placeholder="Identifiant">
            <input type="password" id="login-pass" placeholder="Mot de passe">
            <div class="auth-buttons">
                <button onclick="auth.login()">Connexion</button>
                <button onclick="auth.register()">Créer un compte</button>
            </div>
        </div>
    </div>

    <div id="main-app" class="hidden">
        <nav class="sidebar">
            <h2 id="user-display">Pseudo</h2>
            <div id="nav-links"></div>
            <button onclick="ui.toggleTheme()" class="theme-toggle">Mode Clair/Sombre</button>
            <button onclick="auth.logout()">Déconnexion</button>
        </nav>

        <main id="content-area">
    </main>
    </div>

    <div id="success-popup" class="popup hidden">
        <div class="popup-content">
            <h2>Bravo ! Vous avez obtenu le succès :</h2>
            <h3 id="ach-name">Nom du succès</h3>
            <p><span id="ach-reward">0</span> vœux gagnés</p>
            <button onclick="ui.closePopup()">Récupérer</button>
        </div>
    </div>

    <script src="database.js"></script>
    <script src="app.js"></script>
</body>
</html>
